name: CI-CD Deploy to RHEL

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Copy jar to RHEL server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RHEL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 ${{ secrets.RHEL_HOST }} >> ~/.ssh/known_hosts
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/id_rsa -p 22" \
            build/libs/springboot-developer-0.0.1-SNAPSHOT.jar \
            ${{ secrets.RHEL_USER }}@${{ secrets.RHEL_HOST }}:/opt/blogapp/

      - name: Restart service
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -p 22 \
            ${{ secrets.RHEL_USER }}@${{ secrets.RHEL_HOST }} \
            "sudo /usr/bin/systemctl restart blogapp.service"